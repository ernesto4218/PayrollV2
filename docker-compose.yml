version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - '8181:80'
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network

  sveltekit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sveltekit
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      PUBLIC_NAME: ${PUBLIC_NAME}
      PUBLIC_SHORT_NAME: ${PUBLIC_SHORT_NAME}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      PUBLIC_SYSTEM_NAME: ${PUBLIC_SYSTEM_NAME}
      PUBLIC_SHORT_SYSTEM_NAME: ${PUBLIC_SHORT_SYSTEM_NAME}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_DATABASE: ${DB_DATABASE}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
