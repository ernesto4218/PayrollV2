version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 'akoarani123456xx11@@@@@'
      MYSQL_DATABASE: 'payroll_system'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: 'akoarani123456xx11@@@@@'
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network

  sveltekit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sveltekit
    restart: unless-stopped
    environment:
      PUBLIC_NAME: 'Zamboanga Del Sur Provincial Government College'
      PUBLIC_SHORT_NAME: 'ZDSPGC'
      PUBLIC_DOMAIN: 'payroll@zdspgc.edu.ph'
      PUBLIC_SYSTEM_NAME: 'Payroll Management System'
      PUBLIC_SHORT_SYSTEM_NAME: 'PMS'
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_DATABASE: payroll_system
      DB_PASSWORD: 'akoarani123456xx11@@@@@'
      JWT_SECRET: 'nmXTImfcFnHvq0ntdp7GBDRcHbPZUtHnxyIMlbVgVxEB2ObRWrRK7AAb8ATPkEQHI2zdNqNxEa8bbTuRjpz0uR'
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
